<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <!-- Background -->
  <rect width="1200" height="600" fill="#6B1A2A"/>
  <!-- Diagonal texture -->
  <line x1="-600" y1="0" x2="0" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="-520" y1="0" x2="80" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="-440" y1="0" x2="160" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="-360" y1="0" x2="240" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="-280" y1="0" x2="320" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="-200" y1="0" x2="400" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="-120" y1="0" x2="480" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="-40" y1="0" x2="560" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="40" y1="0" x2="640" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="120" y1="0" x2="720" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="0" x2="800" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="280" y1="0" x2="880" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="360" y1="0" x2="960" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="440" y1="0" x2="1040" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="520" y1="0" x2="1120" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="600" y1="0" x2="1200" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="680" y1="0" x2="1280" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="760" y1="0" x2="1360" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="840" y1="0" x2="1440" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="920" y1="0" x2="1520" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="1000" y1="0" x2="1600" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="1080" y1="0" x2="1680" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <line x1="1160" y1="0" x2="1760" y2="600" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <!-- Top horizontal gold line -->
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#C9A84C" stroke-width="2"/>
  <!-- Bottom horizontal gold line -->
  <line x1="0" y1="560" x2="1200" y2="560" stroke="#C9A84C" stroke-width="2"/>
  <!-- Minimalist wine glass silhouette (centered, white/cream, subtle) -->
  <g transform="translate(600, 300)" opacity="0.12">
    <!-- Bowl -->
    <ellipse cx="0" cy="-60" rx="60" ry="80" fill="#F5F0E8"/>
    <!-- Stem -->
    <rect x="-4" y="20" width="8" height="80" fill="#F5F0E8"/>
    <!-- Base -->
    <ellipse cx="0" cy="100" rx="36" ry="8" fill="#F5F0E8"/>
    <!-- Inner bowl cutout to make it hollow-ish -->
    <ellipse cx="0" cy="-60" rx="52" ry="70" fill="#6B1A2A" opacity="0.88"/>
  </g>
  <!-- Gold centered text -->
  <text x="600" y="310" font-family="Georgia, serif" font-size="18" fill="#C9A84C"
        text-anchor="middle" letter-spacing="8" opacity="0.6">VINO ITALIANO</text>
</svg>